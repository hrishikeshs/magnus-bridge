<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Magnus</title>
  <meta name="theme-color" content="#0d1117">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Magnus">
  <link rel="manifest" href="/manifest.webmanifest">
  <link rel="apple-touch-icon" href="/icons/icon-180.png">
  <link rel="icon" href="/icons/icon-192.png">
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div id="pair-screen" class="hidden">
    <div class="pair-box">
      <div class="pair-logo">⌘</div>
      <h1>Magnus Bridge</h1>
      <p>Run <code>M-x magnus-bridge-pair</code> in Emacs,<br>then enter the code shown there.</p>
      <input id="pair-code" inputmode="numeric" autocomplete="one-time-code"
             maxlength="6" placeholder="000000">
      <button id="pair-btn">Pair this device</button>
      <p id="pair-error" class="error hidden">That code didn’t work — codes expire after 2 minutes.</p>
    </div>
  </div>

  <div id="app" class="hidden">
    <header>
      <span class="title">Magnus</span>
      <span id="conn-dot" class="dot" title="connection"></span>
    </header>
    <nav id="agent-tabs"></nav>
    <main id="feed"></main>
    <footer id="composer">
      <input id="msg-input" placeholder="Message the crew…" autocomplete="off">
      <button id="send-btn">↑</button>
    </footer>
  </div>

  <script src="/app.js"></script>
</body>
</html>
