<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Magnus</title>
  <meta name="theme-color" content="#0d1117">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Magnus">
  <link rel="manifest" href="/manifest.webmanifest">
  <link rel="apple-touch-icon" href="/icons/icon-180.png">
  <link rel="icon" href="/icons/icon-192.png">
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div id="pair-screen" class="hidden">
    <div class="pair-box">
      <div class="pair-logo">⌘</div>
      <h1>Magnus Bridge</h1>
      <p>Run <code>M-x magnus-bridge-pair</code> in Emacs,<br>then enter the code shown there.</p>
      <input id="pair-code" inputmode="numeric" autocomplete="one-time-code"
             maxlength="6" placeholder="000000">
      <button id="pair-btn">Pair this device</button>
      <p id="pair-error" class="error hidden">That code didn’t work — codes expire after 2 minutes.</p>
    </div>
  </div>

  <div id="app" class="hidden">
    <header>
      <span class="title">Magnus</span>
      <button id="settings-btn" title="auto-approve patterns">⚙</button>
      <span id="conn-dot" class="dot" title="connection"></span>
    </header>
    <nav id="agent-tabs"></nav>
    <main id="feed"></main>
    <footer>
      <div id="attach-preview" class="hidden">
        <img id="attach-thumb" alt="">
        <button id="attach-remove">✕</button>
      </div>
      <div id="composer">
        <button id="attach-btn" title="send a photo">📷</button>
        <input id="attach-input" type="file" accept="image/*" class="hidden">
        <!-- The focus dance in app.js suppresses iOS's keyboard accessory
             bar (single-focusable-element rule). Autocorrect and QuickType
             stay on by user preference. -->
        <textarea id="msg-input" rows="1" placeholder="Message the crew…"
                  autocomplete="off" inputmode="text"></textarea>
        <button id="send-btn">↑</button>
      </div>
    </footer>
  </div>

  <div id="allow-modal" class="modal hidden">
    <div class="modal-box">
      <h2>Always allow</h2>
      <p>Future prompts matching this text are auto-approved.
         Edit before confirming; revoke any time from ⚙.</p>
      <input id="allow-pattern" autocomplete="off" spellcheck="false">
      <p id="allow-hint" class="hint"></p>
      <div class="modal-actions">
        <button id="allow-cancel">Cancel</button>
        <button id="allow-confirm" class="primary">Allow &amp; approve</button>
      </div>
    </div>
  </div>

  <div id="patterns-modal" class="modal hidden">
    <div class="modal-box">
      <h2>Auto-approve patterns</h2>
      <div id="patterns-list"></div>
      <p id="patterns-note" class="hint"></p>
      <div class="modal-actions">
        <button id="patterns-close">Close</button>
      </div>
    </div>
  </div>

  <script src="/app.js"></script>
</body>
</html>
